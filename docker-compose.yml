# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose for Coolify
#  Image: https://hub.docker.com/r/diegosouzapw/omniroute (latest = 3.8.46)
#  Source: https://github.com/diegosouzapw/OmniRoute
#
#  Deployment in Coolify:
#    Project → New Resource → "Docker Compose Empty" → paste this file.
#    Coolify auto-generates the secrets (SERVICE_* magic variables) and
#    the domain.
#
#  Application port: 20128 (dashboard + API on a single port).
#  Data (SQLite, logs, backups) persists in the `omniroute-data` volume.
# ──────────────────────────────────────────────────────────────────────

services:
  omniroute:
    # The `latest-web` variant (~2x bigger) ships Chromium/Playwright —
    # required ONLY for web-cookie providers (gemini-web, claude-web,
    # claude-turnstile). For regular API/OAuth providers stay on `latest`.
    # For production consider pinning a version, e.g. diegosouzapw/omniroute:3.8.46
    image: diegosouzapw/omniroute:latest
    restart: unless-stopped
    stop_grace_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - omniroute-data:/app/data
    environment:
      # ── Coolify: domain → port 20128 (auto-routing via Traefik) ──
      - SERVICE_FQDN_OMNIROUTE_20128

      # ── REQUIRED SECRETS (auto-generated by Coolify) ──
      # Dashboard session token signing (equivalent: openssl rand -base64 48)
      - JWT_SECRET=${SERVICE_BASE64_64_JWTSECRET}
      # Encryption of provider API keys in the database (equivalent: openssl rand -hex 32)
      - API_KEY_SECRET=${SERVICE_HEX_64_APIKEYSECRET}
      # At-rest encryption of the whole SQLite database (equivalent: openssl rand -hex 32)
      - STORAGE_ENCRYPTION_KEY=${SERVICE_HEX_64_STORAGEKEY}
      - STORAGE_ENCRYPTION_KEY_VERSION=v1
      # First dashboard login password — readable in Coolify
      # (Environment Variables). After logging in change it in
      # Settings → Security.
      - INITIAL_PASSWORD=${SERVICE_PASSWORD_OMNIROUTE}
      # Machine fingerprint salt — unique per deployment
      - MACHINE_ID_SALT=${SERVICE_BASE64_MACHINESALT}

      # ── NETWORK / REVERSE PROXY ──
      - PORT=20128
      # Behind HTTPS (Coolify's Traefik with TLS) this MUST be true,
      # otherwise session cookies are not sent. On plain HTTP set false.
      - AUTH_COOKIE_SECURE=true
      # Public URL — OAuth callbacks, dashboard-generated links (https://)
      - NEXT_PUBLIC_BASE_URL=${SERVICE_URL_OMNIROUTE}
      # Internal URL for sync jobs — intentionally loopback, do NOT set to the public URL
      - BASE_URL=http://localhost:20128

      # ── SECURITY ──
      # Public deployment: require an API key on the /v1/* endpoints
      # (create keys in Dashboard → API Keys)
      - REQUIRE_API_KEY=true

      # ── STORAGE ──
      - DATA_DIR=/app/data
      - DISABLE_SQLITE_AUTO_BACKUP=false

      # ── REDIS (rate-limiter backend; remove together with the redis
      #    service to fall back to the built-in in-memory limiter) ──
      - REDIS_URL=redis://redis:6379

      # ── RUNTIME (optional) ──
      - NODE_ENV=production
      # Default heap limit = 1024 MB. Under heavier load raise BOTH:
      # - OMNIROUTE_MEMORY_MB=2048
      # - NODE_OPTIONS=--max-old-space-size=2048
      # - APP_LOG_LEVEL=info
      # - TZ=Europe/Warsaw
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  omniroute-data:
  redis-data:
